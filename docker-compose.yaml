services:
  db:
    image: postgres:18
    container_name: invoiceflow-db
    environment:
      POSTGRES_DB: invoiceflow
      POSTGRES_USER: invoiceflow
      POSTGRES_PASSWORD: invoiceflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: invoiceflow-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 500

volumes:
  postgres_data:
